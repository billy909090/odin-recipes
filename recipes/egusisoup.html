    <h1>Egusi Soup</h1>

    <img src="https://simshomekitchen.com/wp-content/uploads/2025/09/Egusi-tripe-cowfootand-meat-in-a-white-bowl-500x500.jpg" alt="image of egusi soup"/>

    <h2>Description</h2>

    <p>This is a nigeria delicious dish called egusi soup</p>
    
    <h3>Ingredients</h3>

    <ul>
        <li>Egusi</li>
        <li>Palm oil</li>
        <li>Vegetable</li>
        <li>Meat or Fish</li>
    </ul>

    <h3>Steps</h3>

    <ol>
        <li>Pour palm in a pan</li>
        <li>Add egusi</li>
        <li>Put water</li>
        <li>Allow to boil</li>
        <li>Add protein fish or meat</li>
        <li>Add Vegetable</li>
    </ol>
